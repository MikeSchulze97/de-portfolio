services:
  ingestion:
    build: ./services/ingestion
    ports:
      - "8000:8000"
    environment:
      DATA_DIR: /data
    volumes:
      - ./data:/data

  event-generator:
    build: ./services/event-generator
    environment:
      INGEST_URL: http://ingestion:8000/ingest
      CSV_PATH: /data/input/data.csv
      DELAY_SECONDS: "1"
    volumes:
      - ./data:/data
    depends_on:
      - ingestion
    profiles: ["generator"]

  # --- Analytics DB (optional serving layer) ---
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: analytics
      POSTGRES_USER: analytics
      POSTGRES_PASSWORD: analytics
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    profiles: ["analytics"]

  # --- Spark path (target implementation) ---
  spark-processing:
    build:
      context: ./services/processing
      dockerfile: Dockerfile.spark
    environment:
      DATA_DIR: /data
      SPARK_LOCAL_IP: 127.0.0.1
    volumes:
      - ./data:/data
    command: ["python", "run_spark_batch.py"]
    profiles: ["spark"]

  spark-aggregation:
    build:
      context: ./services/processing
      dockerfile: Dockerfile.spark
    environment:
      DATA_DIR: /data
      SPARK_LOCAL_IP: 127.0.0.1
    volumes:
      - ./data:/data
    command: ["python", "run_spark_aggregate.py"]
    profiles: ["spark"]

volumes:
  pgdata: